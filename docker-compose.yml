services:
  splunk:
    image: splunk/splunk:latest
    container_name: soc-splunk
    hostname: splunk
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD:-SocDash2026!}
      - SPLUNK_APPS_URL=  # empty — no extra apps
    ports:
      - "8100:8000"   # Splunk Web UI (local fallback)
      - "8189:8089"   # Splunk REST API
      - "8188:8088"   # HTTP Event Collector (HEC)
    volumes:
      - splunk-var:/opt/splunk/var
      - splunk-etc:/opt/splunk/etc
    networks:
      default:
      services-net:
        ipv4_address: 172.21.0.60
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.soc-splunk.rule=Host(`soc-splunk.abokhalil.dev`)"
      - "traefik.http.routers.soc-splunk.entrypoints=websecure"
      - "traefik.http.routers.soc-splunk.tls=true"
      - "traefik.http.services.soc-splunk.loadbalancer.server.port=8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -ks https://localhost:8089/services/server/info -u admin:$$SPLUNK_PASSWORD | grep -q '<title>server-info</title>'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 300s

  grafana:
    image: grafana/grafana-oss:latest
    container_name: soc-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-SocDash2026!}
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/management/infosec-home.json
      - GF_SERVER_ROOT_URL=https://soc-grafana.abokhalil.dev
      # Disable all telemetry/analytics
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
      - GF_ANALYTICS_FEEDBACK_LINKS_ENABLED=false
      # Splunk credentials (provisioned into datasource)
      - SPLUNK_API_TOKEN=${SPLUNK_API_TOKEN:-}
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD:-SocDash2026!}
      # Image renderer for PDF/PNG export
      - GF_RENDERING_SERVER_URL=http://soc-renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://soc-grafana:3000/
      # Infinity plugin: Allow internal Docker network
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-infinity-datasource
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # Disable Infinity security restrictions for development
      - GF_INFINITY_ALLOW_ALL_HOSTS=true
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    ports:
      - "3033:3000"   # Grafana UI (local fallback)
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./mock-data:/var/lib/grafana/mock-data
      - grafana-data:/var/lib/grafana
    networks:
      default:
      services-net:
        ipv4_address: 172.21.0.61
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.soc-grafana.rule=Host(`soc-grafana.abokhalil.dev`)"
      - "traefik.http.routers.soc-grafana.entrypoints=websecure"
      - "traefik.http.routers.soc-grafana.tls=true"
      - "traefik.http.services.soc-grafana.loadbalancer.server.port=3000"
    depends_on:
      - splunk
    restart: unless-stopped

  mock-server:
    build:
      context: .
      dockerfile: ./Dockerfile.mock
    container_name: soc-mock-server
    environment:
      - NODE_ENV=production
    ports:
      - "3999:3001"
    networks:
      default:
    restart: unless-stopped

  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: soc-renderer
    environment:
      - ENABLE_METRICS=true
      - HTTP_PORT=8081
    networks:
      default:
    restart: unless-stopped

networks:
  default:
  services-net:
    external: true

volumes:
  splunk-var:
  splunk-etc:
  grafana-data:
