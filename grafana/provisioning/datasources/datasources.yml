apiVersion: 1

deleteDatasources:
  - name: Splunk-API
    orgId: 1
  - name: SOAR-API
    orgId: 1
  - name: Mock-Data
    orgId: 1

datasources:
  # --- Infinity: Splunk REST API ---
  - name: Splunk-API
    type: yesoreyeram-infinity-datasource
    uid: splunk-api
    access: proxy
    url: http://soc-splunk:8089
    isDefault: true
    # Grafana core TLS skip
    tls_skip_verify_insecure: true
    jsonData:
      authType: bearerToken
      # Infinity plugin TLS skip
      tlsSkipVerify: true
      allowedHosts:
        - http://soc-splunk
        - http://soc-splunk:8089
        - https://soc-splunk
        - https://soc-splunk:8089
        - soc-splunk
        - soc-splunk:8089
        - localhost
        - 127.0.0.1
        - 172.21.0.60
    secureJsonData:
      bearerToken: "${SPLUNK_API_TOKEN}"
    editable: true

  # --- Infinity: SOAR REST API ---
  - name: SOAR-API
    type: yesoreyeram-infinity-datasource
    uid: soar-api
    access: proxy
    isDefault: false
    jsonData:
      authType: bearerToken
      tlsSkipVerify: true
      allowedHosts:
        - "${SOAR_API_URL}"
        - localhost
    secureJsonData:
      bearerToken: "${SOAR_API_TOKEN}"
    editable: true

  # --- Infinity: Mock Data (time-aware Node.js server) ---
  - name: Mock-Data
    type: yesoreyeram-infinity-datasource
    uid: mock-data
    access: proxy
    url: http://soc-mock-server:3001
    isDefault: false
    jsonData:
      authType: none
      tlsSkipVerify: true
      allowedHosts:
        - http://soc-mock-server
        - http://soc-mock-server:3001
        - https://soc-mock-server
        - https://soc-mock-server:3001
        - soc-mock-server
        - soc-mock-server:3001
        - localhost
        - 127.0.0.1
        - 172.24.0.4
    editable: true
