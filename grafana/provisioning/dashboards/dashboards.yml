apiVersion: 1

providers:
  - name: "SOC - Management"
    orgId: 1
    folder: "SOC Management"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/management
      foldersFromFilesStructure: false

  - name: "SOC - Detailed"
    orgId: 1
    folder: "SOC Detailed"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/detailed
      foldersFromFilesStructure: false
